name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - feature/**
      - harden-**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run contract validation
        run: npm run validate

      - name: Run tests
        run: npm test
